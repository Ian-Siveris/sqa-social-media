name: Esteira de CI (SQA)

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: sqa_social_media
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Rodar Testes do Backend (JUnit)
        working-directory: ./api
        run: |
          chmod +x mvnw
          ./mvnw clean test

      - name: Rodar Testes do Frontend (Jest)
        working-directory: ./client
        run: |
          npm install
          npm run test

      - name: Instalar dependências E2E (Playwright)
        working-directory: ./tests
        run: |
          npm install
          npx playwright install --with-deps chromium firefox webkit

      - name: Iniciar Servidores e Rodar E2E
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/sqa_social_media?useSSL=false&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_JPA_HIBERNATE_DDL_AUTO: update
        run: |
          cd api
          ./mvnw spring-boot:run &
          
          cd ../client
          npm run dev &
          
          cd ../tests
          # Usando 127.0.0.1 para evitar conflitos de IPv6 na nuvem
          npx wait-on tcp:127.0.0.1:8080 tcp:127.0.0.1:3000 -t 120000
          
          npx playwright test
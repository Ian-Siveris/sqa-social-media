name: Esteira de CI (SQA)

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Rodar Testes do Backend (JUnit)
        working-directory: ./api
        run: |
          chmod +x mvnw
          ./mvnw clean test

      - name: Rodar Testes do Frontend (Jest)
        working-directory: ./client
        run: |
          npm install
          npm run test

      - name: Instalar dependências E2E (Playwright)
        working-directory: ./tests
        run: |
          npm install
          npx playwright install --with-deps chromium firefox webkit

      - name: Iniciar Servidores e Rodar E2E
        env:
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: sa
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          SPRING_JPA_HIBERNATE_DDL_AUTO: update
        run: |
          cd api
          ./mvnw spring-boot:run &
          
          cd ../client
          npm run dev &
          
          cd ../tests
          npx wait-on tcp:127.0.0.1:8080 tcp:127.0.0.1:3000 -t 120000
          
          npx playwright test